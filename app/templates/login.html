<!DOCTYPE html>
<html>
<head>
    <title>Track My Run Login</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="login-body">

<div class="login-card">

    <h1>TrackMyRun</h1>

    <form id="loginForm">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            id="password"
            placeholder="Password"
            required
        >

        <button type="submit">
            Login
        </button>

    </form>

    <p id="errorText"></p>

</div>

<script src="/static/login.js"></script>

</body>
</html>
